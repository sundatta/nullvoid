version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: nullvoid-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nullvoid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nullvoid_secret}
      POSTGRES_DB: ${POSTGRES_DB:-nullvoid}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nullvoid"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nullvoid-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
