version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: nullvoid-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nullvoid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nullvoid_secret}
      POSTGRES_DB: ${POSTGRES_DB:-nullvoid}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - nullvoid
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: nullvoid-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - nullvoid
    restart: unless-stopped

  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.bot
    container_name: nullvoid-bot
    environment:
      NODE_ENV: production
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DATABASE_URL: postgresql://nullvoid:nullvoid_secret@postgres:5432/nullvoid
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - postgres
      - redis
    networks:
      - nullvoid
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: nullvoid-api
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DATABASE_URL: postgresql://nullvoid:nullvoid_secret@postgres:5432/nullvoid
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      API_PORT: 3001
      DASHBOARD_URL: ${DASHBOARD_URL}
    depends_on:
      - postgres
      - redis
    networks:
      - nullvoid
    restart: unless-stopped

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    container_name: nullvoid-dashboard
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - api
    networks:
      - nullvoid
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

networks:
  nullvoid:
    driver: bridge
