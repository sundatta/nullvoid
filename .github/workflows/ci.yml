name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nullvoid
          POSTGRES_PASSWORD: nullvoid_secret
          POSTGRES_DB: nullvoid_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run test
        env:
          DATABASE_URL: postgresql://nullvoid:nullvoid_secret@localhost:5432/nullvoid_test
          REDIS_URL: redis://localhost:6379
          DISCORD_TOKEN: test-token
          DISCORD_CLIENT_ID: test-id
          DISCORD_CLIENT_SECRET: test-secret
          JWT_SECRET: test-jwt-secret-that-is-at-least-32-chars-long

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: $matrix.node-version
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
